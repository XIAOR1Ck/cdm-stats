<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title></title>
    <link href="style.css" rel="stylesheet" />
</head>

<body>
    <main>
        <div id="_formContainer">
            <form action="" id="_searchData">
                <div id="_normalArea">
                    <div id="_selectBoxes">
                        <div id="_formElements">
                            <label for="datatype">Data Type</label>
                            <select name="datatype" id="_datatype">
                                <option value="schedule">Schedule</option>
                                <option value="searchPlayer">Player</option>
                                <option value="napData">Map Data</option>
                                <option value="temData">Team Data</option>
                            </select>
                        </div>
                        <div id="_formElements">
                            <label for="season">Season</label>
                            <select name="season" id="_season">
                                <option value="CODML2025S2">current</option>
                                <option value="CODML2025S1">2025 S1</option>
                                <option value="CODML2024S2">2024 S2</option>
                                <option value="CODML2024S1">2024 S1</option>
                            </select>
                        </div>
                    </div>
                    <fieldset>
                        <legend>Which Game Mode?</legend>
                        <div id="_radioBoxes">
                            <div>
                                <input type="radio" id="_fullRadio" name="gameModes" value="FULL" checked />
                                <label for="_fullRadio">Full</label>
                            </div>

                            <div>
                                <input type="radio" id="_hpRadio" name="gameModes" value="Hotspot" />
                                <label for="_hpRadio">Hardpoint</label>
                            </div>

                            <div>
                                <input type="radio" id="_sndRadio" name="gameModes" value="Blast" />
                                <label for="_sndRadio">S&D</label>
                            </div>
                            <div>
                                <input type="radio" id="_ctlRadio" name="gameModes" value="Control" />
                                <label for="_ctlRadio">Control</label>
                            </div>
                        </div>
                    </fieldset>
                </div>
                <div id="_searchArea">
                    <!-- <input type="text" id="_playerInput" list="_playerList" placeholder="Search Player..." />

<input type="hidden" id="_playerId" /> -->
                </div>
                <div id="_submitDiv">
                    <input type="submit" id="_Btn" />
                </div>
            </form>
        </div>
    </main>
    <script src="./main.js" defer></script>
</body>

</html>
